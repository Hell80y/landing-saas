name = "landing-runtime"
main = "src/index.ts"
compatibility_date = "2026-01-01"

# KV binding example:
# 1) Create namespace:
#    wrangler kv namespace create "LANDING_KV"
# 2) Copy generated id below.
[[kv_namespaces]]
binding = "LANDING_KV"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_YOUR_PREVIEW_KV_NAMESPACE_ID"
compatibility_date = "2024-08-01"

[[kv_namespaces]]
binding = "COMBINED_SPEC_KV"
id = "replace_in_cloudflare"
