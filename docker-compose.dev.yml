version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: landing-saas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: landing_saas
      POSTGRES_USER: landing
      POSTGRES_PASSWORD: landing
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U landing -d landing_saas"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: landing-saas-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
